<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fart Clicker: Sigma Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <h1>☢️ FART CLICKER ☢️</h1>
        <div class="stats">
            <p>Stink: <span id="points">0</span></p>
            <p>Multiplier: <span id="mult">1.0</span>x</p>
            <p>Rebirths: <span id="rebirths">0</span></p>
        </div>
        <button id="main-btn">💨 PUSH 💨</button>

        <div class="tabs">
            <button onclick="showTab('upgrades')">🛒 Upgrades</button>
            <button onclick="showTab('pets')">🐶 Pets</button>
        </div>

        <div id="upgrades" class="tab-content"></div>
        <div id="pets" class="tab-content" style="display:none;">
            <button onclick="rollPet()" style="background:#FF4500; color:white; padding:10px;">Roll Pet (Cost: 5000)</button>
            <div id="pet-display"></div>
        </div>
        <button onclick="rebirth()" style="margin-top:20px; background:#4B0082; color:white;">REBIRTH</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
