<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fart Clicker: Ultimate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="animated-bg"></div>
    <div id="particle-overlay"></div>

    <div id="game-container">
        <div class="logo-container">
            <h1 id="game-title">💨 FART CLICKER</h1>
            <p class="subtitle">The Ultimate Idle Stink Empire</p>
        </div>

        <div class="stats-panel">
            <div class="stat-cell big">
                <span class="stat-label">Stink Level</span>
                <span id="points" class="stat-value">0</span>
            </div>
            <div class="stat-grid">
                <div class="stat-cell"><span class="stat-label">Per Click</span><span id="per-click" class="stat-value">1</span></div>
                <div class="stat-cell"><span class="stat-label">Passive</span><span id="passive-income" class="stat-value">0/s</span></div>
                <div class="stat-cell"><span class="stat-label">Combo</span><span id="spam-mult" class="stat-value">1.0x</span></div>
                <div class="stat-cell"><span class="stat-label">Rebirths</span><span id="rebirths" class="stat-value">0</span></div>
            </div>
            <div class="stat-cell world-cell">
                <span class="stat-label">Current World</span>
                <span id="world-name" class="stat-value">Basement</span>
            </div>
        </div>


        <div class="clicker-zone">
            <button id="main-btn" class="main-click-btn">
                <span class="main-emoji">💨</span>
                <span class="main-label">CLICK ME!</span>
            </button>
        </div>

        <div class="control-row">
            <button class="ctrl-btn upgrades-toggle-btn" onclick="toggleUpgradesMenu()">🛒 Upgrades</button>
            <button id="bgm-toggle-btn" class="ctrl-btn bgm-toggle-btn" onclick="toggleBGM()">🎵 <span id="bgm-status">BGM: OFF</span></button>
        </div>

        <button onclick="rebirth()" id="rebirth-btn" class="rebirth-btn">🔄 REBIRTH<span class="rb-cost">1M 💨</span></button>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('pets', this)">🐶 Pets</button>
            <button class="tab-btn" onclick="showTab('worlds', this)">🌍 Worlds</button>
        </div>

        <div id="pets" class="tab-content active"></div>
        <div id="worlds" class="tab-content"></div>
    </div>

    <!-- Sliding Upgrades Panel -->
    <div class="upgrades-overlay" id="upgrades-overlay" onclick="toggleUpgradesMenu()"></div>
    <div id="upgrades-panel">
        <div id="upgrades-panel-header">
            <h2>🛒 Upgrades</h2>
            <button class="close-panel-btn" onclick="toggleUpgradesMenu()">&times;</button>
        </div>
        <div id="upgrades-panel-content">
            <div class="upgrades-panel-section">
                <h3>⬆️ Click Power</h3>
                <div id="upgrades-panel-click"></div>
            </div>
            <div class="upgrades-panel-section">
                <h3>💰 Passive Income</h3>
                <div id="upgrades-panel-passive"></div>
            </div>
            <div class="upgrades-panel-section">
                <h3>🐾 Pet Slots</h3>
                <div id="upgrades-panel-pets"></div>
            </div>
        </div>
    </div>


    <!-- Egg Modal -->
    <div id="egg-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeEggModal()">&times;</button>
            <h2>🥚 Open Eggs</h2>
            <div id="egg-selection"></div>
        </div>
    </div>

    <!-- Pet Modal -->
    <div id="pet-modal" class="modal hidden">
        <div class="modal-content pet-modal-content">
            <button class="close-btn" onclick="closePetModal()">&times;</button>
            <div id="pet-details"></div>
            <div class="modal-actions">
                <button id="equip-btn" class="modal-btn" onclick="equipPet()">Equip</button>
                <button class="modal-btn secondary" onclick="closePetModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
